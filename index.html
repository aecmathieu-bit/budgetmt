<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Budget">
<title>Mon Budget</title>
<style>
:root {
  --bg: #0B1622;
  --bg2: #112031;
  --card: #162840;
  --card2: #1E3450;
  --text: #F0F4FF;
  --text2: #7A9BBF;
  --text3: #4A6A8A;
  --border: rgba(100,160,220,0.15);
  --tint: #00C2FF;
  --green: #00E5A0;
  --red: #FF4D6A;
  --orange: #FFB830;
  --purple: #A78BFA;
  --yellow: #FFD700;
  --tab-bg: rgba(11,22,34,0.97);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  padding-top:calc(var(--safe-top) + 0px);}
.screen{display:none;padding:0 0 calc(var(--safe-bottom) + 68px);}
.screen.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;
  background:rgba(11,22,34,0.97);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,194,255,0.12);
  padding:14px 16px 12px;text-align:center;}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:0.01em;
  background:linear-gradient(90deg,#00C2FF,#00E5A0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar p{font-size:12px;color:var(--text2);margin-top:2px;}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(11,22,34,0.98);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid rgba(0,194,255,0.15);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding-bottom:var(--safe-bottom);}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:10px 0 6px;cursor:pointer;border:none;background:none;color:var(--text3);
  font-size:10px;font-weight:500;-webkit-appearance:none;transition:color .2s;}
.tab.active{color:var(--tint);}
.tab.active svg{filter:drop-shadow(0 0 4px rgba(0,194,255,0.6));}
.tab svg{width:24px;height:24px;}
.section{padding:20px 16px 0;}
.section-title{font-size:11px;font-weight:700;color:var(--tint);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;padding:0 4px;
  opacity:0.85;}
.card{background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:10px;
  border:1px solid rgba(0,194,255,0.1);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.card-row{display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid rgba(100,160,220,0.1);}
.card-row:last-child{border-bottom:none;}
.input-wrap{padding:12px 16px;border-bottom:1px solid rgba(100,160,220,0.1);}
.input-wrap:last-child{border-bottom:none;}
.input-wrap label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;letter-spacing:0.02em;}
.input-wrap input,.input-wrap select{width:100%;font-size:16px;padding:9px 12px;
  border:1px solid rgba(0,194,255,0.2);border-radius:10px;
  background:var(--bg2);color:var(--text);-webkit-appearance:none;outline:none;}
.input-hint{font-size:11px;color:var(--text3);margin-top:4px;}
.btn{display:block;width:calc(100% - 32px);margin:12px 16px 0;
  padding:15px;font-size:16px;font-weight:700;letter-spacing:0.02em;
  border:none;border-radius:14px;cursor:pointer;-webkit-appearance:none;
  transition:transform .15s,box-shadow .15s;}
.btn-primary{background:linear-gradient(135deg,#00C2FF,#0080CC);color:#fff;
  box-shadow:0 4px 15px rgba(0,194,255,0.3);}
.btn-green{background:linear-gradient(135deg,#00E5A0,#00A870);color:#0B1622;
  box-shadow:0 4px 15px rgba(0,229,160,0.3);}
.btn-red{background:linear-gradient(135deg,#FF4D6A,#CC1A35);color:#fff;}
.btn:active{transform:scale(0.97);}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.sum-card{background:var(--card);border-radius:14px;padding:14px;
  border:1px solid rgba(0,194,255,0.1);box-shadow:0 4px 16px rgba(0,0,0,0.25);}
.sum-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;}
.sum-val{font-size:21px;font-weight:700;margin-top:4px;letter-spacing:-0.02em;}
.prog-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0;}
.prog-bar{height:100%;border-radius:3px;transition:width .5s;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:20px;margin-left:6px;letter-spacing:0.02em;}
.badge-blue{background:rgba(0,194,255,0.15);color:#00C2FF;border:1px solid rgba(0,194,255,0.3);}
.badge-green{background:rgba(0,229,160,0.15);color:#00E5A0;border:1px solid rgba(0,229,160,0.3);}
@media(prefers-color-scheme:dark){
  .badge-blue{background:#0A3060;color:#6AB4FF;}
  .badge-green{background:#0A2E14;color:#30D158;}
}
.hero{margin:16px;background:linear-gradient(135deg,#0D2E4A,#1A4A6B);
  border-radius:18px;padding:22px;color:#fff;position:relative;overflow:hidden;
  border:1px solid rgba(0,194,255,0.25);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;
  width:140px;height:140px;background:radial-gradient(circle,rgba(0,194,255,0.12),transparent 70%);border-radius:50%;}
.hero::after{content:'';position:absolute;left:-20px;bottom:-20px;
  width:100px;height:100px;background:radial-gradient(circle,rgba(0,229,160,0.08),transparent 70%);border-radius:50%;}
.hero h2{font-size:12px;color:rgba(0,194,255,0.8);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}
.hero .big{font-size:34px;font-weight:800;letter-spacing:-0.04em;margin:6px 0;
  background:linear-gradient(90deg,#fff,#A0D8FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero .sub{font-size:13px;color:rgba(160,216,255,0.7);}
#toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:rgba(22,40,64,0.95);color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:600;
  z-index:999;transition:transform .3s ease;white-space:nowrap;max-width:90vw;
  border:1px solid rgba(0,194,255,0.3);backdrop-filter:blur(10px);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{background:rgba(0,130,80,0.9);border-color:rgba(0,229,160,0.4);}
#toast.err{background:rgba(180,30,50,0.9);border-color:rgba(255,77,106,0.4);}
.del-btn{background:none;border:none;color:var(--red);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
input:focus{outline:none;border-color:var(--tint)!important;box-shadow:0 0 0 3px rgba(0,194,255,.15);}
.center-empty{text-align:center;padding:60px 20px;color:var(--text2);}
.add-btn{width:100%;padding:11px;font-size:14px;font-weight:600;
  border:1px dashed rgba(0,194,255,0.4);border-radius:12px;
  background:rgba(0,194,255,0.05);color:var(--tint);cursor:pointer;transition:background .2s;}
.chart-shell{padding:16px;}
.ring-wrap{display:flex;align-items:center;justify-content:center;padding:10px 0 4px;}
.ring{width:180px;height:180px;border-radius:50%;display:grid;place-items:center;position:relative;}
.ring::before{content:'';position:absolute;inset:18px;border-radius:50%;background:var(--bg2);}
.ring-inner{position:relative;z-index:2;text-align:center;padding:0 18px;}
.ring-big{font-size:28px;font-weight:700;letter-spacing:-0.03em;}
.ring-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.small-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.small-chip{background:var(--bg2);border-radius:12px;padding:12px;
  border:1px solid rgba(0,194,255,0.1);}
.small-chip .l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;}
.small-chip .v{font-size:17px;font-weight:700;margin-top:4px;}
.note{font-size:12px;color:var(--text2);line-height:1.35;}
</style>
</head>
<body>
 
<div id="toast"></div>
 
<div class="screen active" id="screen-home">
  <div class="topbar"><h1>Mon Budget</h1><p id="home-subtitle">Chargement…</p></div>
  <div id="home-body"></div>
</div>
 
<div class="screen" id="screen-saisie">
  <div class="topbar"><h1>✏️ Saisie de la semaine</h1></div>
  <div id="saisie-body"></div>
</div>
 
<div class="screen" id="screen-hist">
  <div class="topbar"><h1>📅 Historique</h1></div>
  <div id="hist-body"></div>
</div>
 
<div class="screen" id="screen-params">
  <div class="topbar"><h1>⚙️ Paramètres</h1></div>
  <div id="params-body"></div>
</div>
 
<nav class="tabbar">
  <button class="tab active" onclick="showTab('home')" id="tab-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Tableau
  </button>
  <button class="tab" onclick="showTab('saisie')" id="tab-saisie">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Saisie
  </button>
  <button class="tab" onclick="showTab('hist')" id="tab-hist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Historique
  </button>
  <button class="tab" onclick="showTab('params')" id="tab-params">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Réglages
  </button>
</nav>
 
<script>
const STORE_P = 'mbp5', STORE_E = 'mbe5'
 
const DEF_PARAMS = {
  revenus_fixes: [
    {id:'r1', label:'Salaire net / semaine', montant:704.79, periode:'hebdo'},
    {id:'r2', label:'Allocation canadienne pour enfants', montant:284.34, periode:'mensuel'},
    {id:'r3', label:'Allocation famille Québec', montant:460.20, periode:'trimestriel'},
  ],
  factures: [
    {id:'f1', label:'Loyer / Hypothèque', montant:500},
    {id:'f2', label:'Internet', montant:96.50},
    {id:'f3', label:'Abonnements', montant:48},
    {id:'f4', label:'Autre dette (sans intérêt)', montant:250},
  ],
  cartes: [
    {id:'c1', nom:'Capital One Gold', solde_init:785.51, limite:1000, taux:19.99, min_h:6.25},
    {id:'c2', nom:'Capital One Blue', solde_init:823.67, limite:1000, taux:19.99, min_h:6.25},
    {id:'c3', nom:'Canadian Tire', solde_init:1944.12, limite:2500, taux:19.99, min_h:12.50},
  ],
  epargne_h: 12.50,
  dep_var_cible: 200,
  celiapp_cible_h: 153.85,
  celiapp_total: 0,
}
 
let params = JSON.parse(JSON.stringify(DEF_PARAMS))
let entries = []
 
function migrateParams(p){
  if(!p) return JSON.parse(JSON.stringify(DEF_PARAMS))
  const out = JSON.parse(JSON.stringify(p))
  if(!Array.isArray(out.revenus_fixes)){
    out.revenus_fixes = [
      {id:'r1', label:'Salaire net / semaine', montant:+(out.salaire_hebdo||0), periode:'hebdo'},
      {id:'r2', label:'Allocation canadienne pour enfants', montant:+(out.alloc_can||0), periode:'mensuel'},
      {id:'r3', label:'Allocation famille Québec', montant:+(out.alloc_qc||0), periode:'trimestriel'},
    ]
  }
  if(!Array.isArray(out.factures)) out.factures = JSON.parse(JSON.stringify(DEF_PARAMS.factures))
  if(!Array.isArray(out.cartes)) out.cartes = JSON.parse(JSON.stringify(DEF_PARAMS.cartes))
  out.cartes = out.cartes.map((c,i)=>({
    id:c.id||('c'+(i+1)), nom:c.nom||('Carte '+(i+1)),
    solde_init:+(c.solde_init||0),
    limite:+(c.limite||Math.max((+(c.solde_init||0))*1.2,+(c.solde_init||0),1000)),
    taux:+(c.taux||0), min_h:+(c.min_h||0),
  }))
  out.factures = out.factures.map((f,i)=>({
    id:f.id||('f'+(i+1)), label:f.label||('Facture '+(i+1)), montant:+(f.montant||0),
  }))
  out.revenus_fixes = out.revenus_fixes.map((r,i)=>({
    id:r.id||('r'+(i+1)), label:r.label||('Revenu '+(i+1)), montant:+(r.montant||0),
    periode:['hebdo','mensuel','trimestriel'].includes(r.periode)?r.periode:'hebdo',
  }))
  out.epargne_h = +(out.epargne_h||0)
  out.dep_var_cible = +(out.dep_var_cible||0)
  out.celiapp_cible_h = +(out.celiapp_cible_h||153.85)
  out.celiapp_total = +(out.celiapp_total||0)
  delete out.salaire_hebdo; delete out.alloc_can; delete out.alloc_qc
  return out
}
 
const _mem = {}
function save(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)) }catch(e){ _mem[key]=JSON.stringify(val) }
}
function load(key){
  try{ const v=localStorage.getItem(key)||_mem[key]; return v?JSON.parse(v):null }
  catch(e){ try{ return _mem[key]?JSON.parse(_mem[key]):null }catch(e2){return null} }
}
 
function init(){
  const p=load(STORE_P), legacyP=load('mbp4')
  params=migrateParams(p||legacyP||DEF_PARAMS)
  const e=load(STORE_E), legacyE=load('mbe4')
  entries=e||legacyE||[]
  renderAll()
}
 
function revenuHebdo(r){
  const m=+(r.montant||0)
  if(r.periode==='hebdo') return m
  if(r.periode==='mensuel') return m/4
  if(r.periode==='trimestriel') return m/13
  return m
}
function rev_h(){ return params.revenus_fixes.reduce((s,r)=>s+revenuHebdo(r),0) }
function fact_m(){ return params.factures.reduce((s,f)=>s+(+f.montant||0),0) }
function fact_h(){ return fact_m()/4 }
 
function soldes(){
  return params.cartes.map(c=>{
    const a=entries.reduce((s,e)=>s+(e.cartes?.find(x=>x.id===c.id)?.achats||0),0)
    const p=entries.reduce((s,e)=>s+(e.cartes?.find(x=>x.id===c.id)?.paiement||0),0)
    return {...c, solde:Math.max(0,c.solde_init+a-p)}
  })
}
function snowball(){ return soldes().filter(c=>c.solde>0).sort((a,b)=>a.solde-b.solde) }
function attack_h(){
  const sb=snowball(); if(!sb.length) return 0
  const min_others=sb.slice(1).reduce((s,c)=>s+c.min_h,0)
  return Math.max(sb[0].min_h, rev_h()-fact_h()-params.dep_var_cible-min_others-params.epargne_h)
}
function creditStats(){
  const s=soldes()
  const limiteTotale=s.reduce((sum,c)=>sum+(+c.limite||0),0)
  const utilise=s.reduce((sum,c)=>sum+(+c.solde||0),0)
  const libre=Math.max(0,limiteTotale-utilise)
  const pctLibre=limiteTotale>0?(libre/limiteTotale)*100:0
  return {limiteTotale,utilise,libre,pctLibre,cartes:s}
}
 
function fmt(n){
  const v=+n||0,a=Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,' ')
  return `${v<0?'-':''}${a} $`
}
function clr(v){ return v>=0?'var(--green)':'var(--red)' }
function esc(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}
function defaultWeekLabel(d=new Date()){
  const date=new Date(d), day=date.getDay(), diff=day===0?-6:1-day
  date.setDate(date.getDate()+diff)
  const mois=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre']
  return `semaine du ${date.getDate()} ${mois[date.getMonth()]} ${date.getFullYear()}`
}
 
function showTab(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.getElementById('screen-'+name).classList.add('active')
  document.getElementById('tab-'+name).classList.add('active')
  const renders={home:renderHome,saisie:renderSaisie,hist:renderHist,params:renderParams}
  renders[name]&&renders[name]()
}
function toast(msg,ok=true){
  const t=document.getElementById('toast')
  t.textContent=msg; t.className='show '+(ok?'ok':'err')
  setTimeout(()=>t.className='',2200)
}
 
// ── TABLEAU ──
function renderHome(){
  const sb=snowball(), tots=soldes()
  const totalDette=tots.reduce((s,c)=>s+c.solde,0)
  const totalInit=params.cartes.reduce((s,c)=>s+c.solde_init,0)
  const pct=totalInit>0?Math.min(100,(1-totalDette/totalInit)*100):100
  const totalEp=entries.reduce((s,e)=>s+(e.epargne||0),0)
  const atk=attack_h()
  const min_others=sb.length>1?sb.slice(1).reduce((s,c)=>s+c.min_h,0):0
  const pay_m=(atk+min_others)*4
  const months=pay_m>0&&totalDette>0?Math.ceil(totalDette/pay_m):0
  const rh=rev_h(), fh=fact_h()
  const reste=rh-fh-params.dep_var_cible-atk-min_others-params.epargne_h
  const cs=creditStats()
  const celiTotal=entries.reduce((s,e)=>s+(e.celiapp||0),0)+params.celiapp_total
  document.getElementById('home-subtitle').textContent=`${fmt(rh)}/sem · Dettes: ${fmt(totalDette)}`
  const pctUtilise=Math.max(0,Math.min(100,100-cs.pctLibre))
  const ringColor=pctUtilise>80?'var(--red)':pctUtilise>50?'var(--orange)':pctUtilise>30?'#FFCC00':'var(--green)'
  const ringPct=pctUtilise
  const ringStyle=`conic-gradient(${ringColor} 0 ${ringPct}%, var(--border) ${ringPct}% 100%)`
 
  let html=`
  <div class="sum-grid" style="margin-bottom:8px;">
    <div class="sum-card"><div class="sum-label">Revenu / sem.</div>
      <div class="sum-val" style="color:var(--green)">${fmt(rh)}</div></div>
    <div class="sum-card"><div class="sum-label">Factures / sem.</div>
      <div class="sum-val" style="color:var(--tint)">${fmt(fh)}</div></div>
    <div class="sum-card"><div class="sum-label">Épargne accumulée</div>
      <div class="sum-val" style="color:var(--purple)">${fmt(totalEp)}</div></div>
    <div class="sum-card"><div class="sum-label">Reste estimé / sem.</div>
      <div class="sum-val" style="color:${clr(reste)}">${fmt(reste)}</div></div>
  </div>
  <div class="section">
    <div class="section-title">💳 Crédit libre total</div>
    <div class="card">
      <div class="chart-shell">
        <div class="ring-wrap">
          <div class="ring" style="background:${ringStyle};">
            <div class="ring-inner">
              <div class="ring-big">${ringPct.toFixed(0)}%</div>
              <div class="ring-sub">crédit utilisé</div>
            </div>
          </div>
        </div>
        <div class="small-grid">
          <div class="small-chip"><div class="l">Limite totale</div><div class="v">${fmt(cs.limiteTotale)}</div></div>
          <div class="small-chip"><div class="l">Utilisé</div><div class="v" style="color:var(--orange)">${fmt(cs.utilise)}</div></div>
          <div class="small-chip"><div class="l">Disponible</div><div class="v" style="color:var(--green)">${fmt(cs.libre)}</div></div>
          <div class="small-chip"><div class="l">Taux d'utilisation</div><div class="v" style="color:var(--tint)">${(100-ringPct).toFixed(0)}%</div></div>
        </div>
 
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">🏦 CELIAPP — Cotisation annuelle</div>
    <div class="card">
      <div class="chart-shell">
        <div class="ring-wrap">
          ${(()=>{
            const pctCeli=Math.min(100,Math.max(0,(celiTotal/8000)*100))
            const celiColor=pctCeli>=76?'var(--green)':pctCeli>=51?'#FFCC00':pctCeli>=26?'var(--orange)':'var(--red)'
            const celiStyle=`conic-gradient(${celiColor} 0 ${pctCeli}%, var(--border) ${pctCeli}% 100%)`
            return `<div class="ring" style="background:${celiStyle};">
              <div class="ring-inner">
                <div class="ring-big">${pctCeli.toFixed(0)}%</div>
                <div class="ring-sub">cotisé</div>
              </div>
            </div>`
          })()}
        </div>
        <div class="small-grid">
          <div class="small-chip"><div class="l">Limite annuelle</div><div class="v">${fmt(8000)}</div></div>
          <div class="small-chip"><div class="l">Cotisé à ce jour</div><div class="v" style="color:var(--green)">${fmt(celiTotal)}</div></div>
          <div class="small-chip"><div class="l">Reste à cotiser</div><div class="v" style="color:var(--tint)">${fmt(Math.max(0,8000-celiTotal))}</div></div>
          <div class="small-chip"><div class="l">Cible / semaine</div><div class="v" style="color:var(--purple)">${fmt(params.celiapp_cible_h)}</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">⛄ Priorités — boule de neige</div>`
 
  if(sb.length===0){
    html+=`<div class="card"><div class="card-row" style="justify-content:center;flex-direction:column;gap:6px;padding:24px;">
      <div style="font-size:36px;">🎉</div>
      <div style="font-weight:700;font-size:17px;color:var(--green)">Toutes les cartes remboursées !</div>
      <div style="font-size:13px;color:var(--text2)">Continue à épargner !</div>
    </div></div>`
  } else {
    html+=`<div class="card">`
    sb.forEach((c,i)=>{
      const limite=+c.limite||+c.solde_init||1
      const pctUtilise=Math.min(100,Math.max(0,(c.solde/limite)*100))
      const isAtk=i===0
      const rec=isAtk?atk:c.min_h
      const intm=c.solde*c.taux/100/12
      // COULEURS : vert 0-30%, jaune 31-50%, orange 51-80%, rouge 81-100%
      const barColor=pctUtilise>80?'var(--red)':pctUtilise>50?'var(--orange)':pctUtilise>30?'#FFCC00':'var(--green)'
      html+=`<div class="card-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
        <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
          <div>
            <span style="font-size:16px;font-weight:500;">${esc(c.nom)}</span>
            <span class="badge ${isAtk?'badge-blue':'badge-green'}">${isAtk?'⛄ Priorité 1':'Priorité '+(i+1)}</span>
          </div>
          <span style="font-size:16px;font-weight:600;">${fmt(limite)}</span>
        </div>
        <div class="prog-wrap" style="width:100%;margin:0;">
          <div class="prog-bar" style="width:${pctUtilise.toFixed(0)}%;background:${barColor};"></div>
        </div>
        <div style="display:flex;justify-content:space-between;width:100%;font-size:12px;color:var(--text2);">
          <span style="color:${barColor};font-weight:600;">${pctUtilise.toFixed(0)}% utilisé · ${fmt(c.solde)} / ${fmt(limite)}</span>
          <span style="font-weight:600;color:var(--tint)">Verser ${fmt(rec)}/sem</span>
        </div>
        <div style="font-size:11px;color:var(--text2);width:100%;text-align:right;">${fmt(intm)}/mois d'intérêts</div>
      </div>`
    })
    html+=`</div>`
  }
  html+=`
  <div class="hero">
    <h2>Dettes totales</h2>
    <div class="big">${fmt(totalDette)}</div>
    <div class="prog-wrap" style="height:8px;background:rgba(255,255,255,.25);margin:10px 0 6px;">
      <div class="prog-bar" style="width:${pct.toFixed(0)}%;background:#fff;"></div>
    </div>
    <div class="sub">${pct.toFixed(0)}% remboursé · libre dans ~${months||'—'} mois</div>
  </div>`
  html+=`<div style="height:8px;"></div></div>`
  document.getElementById('home-body').innerHTML=html
}
 
// ── SAISIE ──
function renderSaisie(){
  const sb=snowball(), atk=attack_h(), autoDate=defaultWeekLabel()
  let html=`
  <div class="section">
    <div class="section-title">Semaine du</div>
    <div class="card">
      <div class="input-wrap">
        <label>Date</label>
        <input type="text" id="s-date" placeholder="ex: semaine du 23 mars 2026" value="${esc(autoDate)}">
        <div class="input-hint">Remplie automatiquement selon la semaine courante.</div>
      </div>
    </div>
    <div class="section-title">Dépenses variables</div>
    <div class="card">
      <div class="input-wrap">
        <label>Total cette semaine — épicerie, cigarettes, etc. ($)</label>
        <input type="number" inputmode="decimal" id="s-dep" placeholder="0.00">
        <div class="input-hint">Cible : ${fmt(params.dep_var_cible)}/sem</div>
      </div>
    </div>
    <div class="section-title">Cartes de crédit</div>
    <div class="card">`
 
  ;[...params.cartes].sort((a,b)=>{
    const ia=sb.findIndex(x=>x.id===a.id), ib=sb.findIndex(x=>x.id===b.id)
    return (ia<0?999:ia)-(ib<0?999:ib)
  }).forEach(c=>{
    const isAtk=sb.findIndex(x=>x.id===c.id)===0&&sb.length>0
    const rec=isAtk?atk:c.min_h
    const sol=soldes().find(x=>x.id===c.id)
    const libre=Math.max(0,(+c.limite||0)-(+sol?.solde||0))
    html+=`<div class="input-wrap" style="border-bottom:0.5px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <span style="font-size:14px;font-weight:600;">${esc(c.nom)}</span>
          ${isAtk?'<span class="badge badge-blue">⛄ Priorité 1</span>':''}
        </div>
        <span style="font-size:13px;color:var(--text2)">Solde: ${fmt(sol?.solde||0)}</span>
      </div>
      <div class="note" style="margin-bottom:8px;">Limite: ${fmt(c.limite||0)} · Libre: ${fmt(libre)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <label>Achats ($)</label>
          <input type="number" inputmode="decimal" id="a-${c.id}" placeholder="0.00">
        </div>
        <div>
          <label>Paiement ($)</label>
          <input type="number" inputmode="decimal" id="p-${c.id}" placeholder="${rec.toFixed(2)}">
          <div class="input-hint" style="color:var(--tint)">Suggéré: ${fmt(rec)}</div>
        </div>
      </div>
    </div>`
  })
  html+=`</div>
    <div class="section-title">Épargne</div>
    <div class="card">
      <div class="input-wrap">
        <label>Montant mis de côté ($)</label>
        <input type="number" inputmode="decimal" id="s-ep" placeholder="${params.epargne_h.toFixed(2)}" value="${params.epargne_h}">
      </div>
    </div>
    <div class="section-title">CELIAPP</div>
    <div class="card">
      <div class="input-wrap">
        <label>Cotisation CELIAPP cette semaine ($)</label>
        <input type="number" inputmode="decimal" id="s-celi" placeholder="${params.celiapp_cible_h.toFixed(2)}" value="${params.celiapp_cible_h}">
        <div class="input-hint">Cible : ${fmt(params.celiapp_cible_h)}/sem · Limite annuelle : 8 000.00 $</div>
      </div>
    </div>
    <div class="section-title">Résumé en temps réel</div>
    <div class="card" id="resume-card"></div>
  </div>
  <button class="btn btn-green" onclick="saveSaisie()">Sauvegarder cette semaine ✓</button>
  <div style="height:8px;"></div>`
 
  document.getElementById('saisie-body').innerHTML=html
  const inputs=['s-dep','s-ep',...params.cartes.flatMap(c=>[`a-${c.id}`,`p-${c.id}`])]
  inputs.forEach(id=>{ const el=document.getElementById(id); el&&el.addEventListener('input',updateResume) })
  updateResume()
}
 
function updateResume(){
  const dep=+(document.getElementById('s-dep')?.value||0)
  const ep=+(document.getElementById('s-ep')?.value||0)
  const celi=+(document.getElementById('s-celi')?.value||0)
  const pays=params.cartes.reduce((s,c)=>s+(+(document.getElementById('p-'+c.id)?.value||0)),0)
  const rh=rev_h(), fh=fact_h(), reste=rh-fh-dep-pays-ep-celi
  const rows=[
    ['Revenus fixes',rh,'var(--green)'],
    ['− Factures (part hebdo)',fh,'var(--tint)'],
    ['− Dépenses variables',dep,'var(--orange)'],
    ['− Paiements cartes',pays,'var(--red)'],
    ['− Épargne',ep,'var(--purple)'],
    ['− CELIAPP',celi,'#1a7a4a'],
  ]
  const card=document.getElementById('resume-card'); if(!card) return
  card.innerHTML=rows.map(([l,v,c])=>`
    <div class="card-row" style="padding:10px 16px;">
      <span style="font-size:14px;color:var(--text2);">${l}</span>
      <span style="font-size:14px;font-weight:500;color:${c};">${fmt(v)}</span>
    </div>`).join('')+
  `<div class="card-row" style="padding:12px 16px;background:${reste>=0?'rgba(52,199,89,.1)':'rgba(255,59,48,.1)'};">
    <span style="font-size:16px;font-weight:700;">Reste</span>
    <span style="font-size:18px;font-weight:700;color:${clr(reste)};">${fmt(reste)}</span>
  </div>`
}
 
function saveSaisie(){
  const date=document.getElementById('s-date')?.value?.trim()
  if(!date){ toast('Indique la semaine du…',false); return }
  const dep=+(document.getElementById('s-dep')?.value||0)
  const ep=+(document.getElementById('s-ep')?.value||0)
  const celi=+(document.getElementById('s-celi')?.value||0)
  const cartes=params.cartes.map(c=>({
    id:c.id,
    achats:+(document.getElementById('a-'+c.id)?.value||0),
    paiement:+(document.getElementById('p-'+c.id)?.value||0),
  }))
  entries=[{id:Date.now(),date,dep_var:dep,epargne:ep,celiapp:celi,cartes},...entries]
  save(STORE_E,entries)
  toast('Semaine sauvegardée ✓')
  renderSaisie(); renderHome(); renderHist()
}
 
// ── HISTORIQUE ──
function renderHist(){
  let html=''
  if(!entries.length){
    html=`<div class="center-empty">
      <div style="font-size:48px;margin-bottom:12px;">📭</div>
      <div style="font-size:16px;font-weight:500;">Aucune entrée</div>
      <div style="font-size:13px;margin-top:6px;">Utilise l'onglet ✏️ Saisie</div>
    </div>`
    document.getElementById('hist-body').innerHTML=html; return
  }
  html+=`<div class="section"><div class="section-title">Semaines (${entries.length})</div><div class="card">`
  entries.forEach(e=>{
    const totalPay=e.cartes?.reduce((s,c)=>s+c.paiement,0)||0
    html+=`<div class="card-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
      <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
        <span style="font-size:15px;font-weight:600;">${esc(e.date||'—')}</span>
        <button class="del-btn" onclick="delEntry(${e.id})">×</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);width:100%;gap:4px;font-size:12px;">
        <div style="color:var(--orange)">Dép. ${fmt(e.dep_var||0)}</div>
        <div style="color:var(--tint)">Paiements ${fmt(totalPay)}</div>
        <div style="color:var(--purple)">Épargne ${fmt(e.epargne||0)}</div>
        ${e.celiapp?`<div style="color:#1a7a4a">CELIAPP ${fmt(e.celiapp)}</div>`:''}
      </div>
      ${(e.cartes||[]).filter(c=>c.paiement>0||c.achats>0).map(c=>{
        const nom=params.cartes.find(x=>x.id===c.id)?.nom||c.id
        return `<div style="font-size:12px;color:var(--text2);width:100%;">${esc(nom)}${c.achats>0?` · Achats ${fmt(c.achats)}`:''}${c.paiement>0?` · Paiement ${fmt(c.paiement)}`:''}</div>`
      }).join('')}
    </div>`
  })
  html+=`</div></div>`
  document.getElementById('hist-body').innerHTML=html
}
 
function delEntry(id){
  if(!confirm('Supprimer cette entrée ?')) return
  entries=entries.filter(e=>e.id!==id)
  save(STORE_E,entries)
  toast('Entrée supprimée')
  renderHist(); renderHome()
}
 
// ── RÉGLAGES ──
function renderParams(){
  const rh=rev_h(), fm=fact_m()
  let html=`
  <div class="section">
    <div class="section-title">💵 Revenus fixes</div>
    <div class="card" id="revenus-list">`
 
  params.revenus_fixes.forEach(r=>{
    html+=`<div class="input-wrap" id="rev-${r.id}">
      <div style="display:grid;grid-template-columns:1fr 110px 110px auto;gap:6px;align-items:center;">
        <input type="text" value="${esc(r.label)}" onchange="updRev('${r.id}','label',this.value)" style="font-size:14px;">
        <input type="number" inputmode="decimal" value="${r.montant}" onchange="updRev('${r.id}','montant',this.value)" style="text-align:right;">
        <select onchange="updRev('${r.id}','periode',this.value)" style="font-size:14px;">
          <option value="hebdo" ${r.periode==='hebdo'?'selected':''}>Hebdo</option>
          <option value="mensuel" ${r.periode==='mensuel'?'selected':''}>Mensuel</option>
          <option value="trimestriel" ${r.periode==='trimestriel'?'selected':''}>Trimestriel</option>
        </select>
        <button class="del-btn" onclick="delRev('${r.id}')">×</button>
      </div>
      <div class="input-hint">Équivaut à ${fmt(revenuHebdo(r))}/sem</div>
    </div>`
  })
 
  html+=`<div style="padding:12px 16px;">
      <button onclick="addRev()" class="add-btn">+ Ajouter un revenu fixe</button>
    </div>
    <div class="card-row" style="background:rgba(52,199,89,.08);">
      <span style="font-size:14px;color:var(--green);font-weight:500;">Total / semaine</span>
      <span style="font-size:16px;font-weight:700;color:var(--green);">${fmt(rh)}</span>
    </div>
  </div>
 
    <div class="section-title">🏠 Factures mensuelles</div>
    <div class="card" id="factures-list">`
 
  params.factures.forEach(f=>{
    html+=`<div class="input-wrap" id="fact-${f.id}">
      <div style="display:grid;grid-template-columns:1fr 80px auto;gap:6px;align-items:center;">
        <input type="text" value="${esc(f.label)}" onchange="updFact('${f.id}','label',this.value)" style="font-size:14px;">
        <input type="number" inputmode="decimal" value="${f.montant}" onchange="updFact('${f.id}','montant',this.value)" style="text-align:right;">
        <button class="del-btn" onclick="delFact('${f.id}')">×</button>
      </div>
    </div>`
  })
 
  html+=`<div style="padding:12px 16px;">
      <button onclick="addFact()" class="add-btn">+ Ajouter une facture</button>
    </div>
    <div class="card-row" style="background:rgba(0,122,255,.06);">
      <span style="font-size:14px;color:var(--tint);font-weight:500;">Total / mois</span>
      <span style="font-size:16px;font-weight:700;color:var(--tint);">${fmt(fm)} → ${fmt(fm/4)}/sem</span>
    </div>
  </div>
 
    <div class="section-title">💳 Cartes de crédit</div>
    <div id="cartes-list">`
 
  params.cartes.forEach(c=>{
    const solActuel=soldes().find(x=>x.id===c.id)?.solde||0
    const libre=Math.max(0,(+c.limite||0)-solActuel)
    html+=`<div class="card" style="margin-bottom:8px;">
      <div class="card-row">
        <span style="font-weight:600;font-size:15px;">${esc(c.nom)}</span>
        <button class="del-btn" onclick="delCarte('${c.id}')">×</button>
      </div>
      <div class="input-wrap">
        <label>Nom de la carte</label>
        <input type="text" value="${esc(c.nom)}" onchange="updCarte('${c.id}','nom',this.value)">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;">
        <div class="input-wrap">
          <label>Solde initial ($)</label>
          <input type="number" inputmode="decimal" value="${c.solde_init}" onchange="updCarte('${c.id}','solde_init',this.value)">
        </div>
        <div class="input-wrap">
          <label>Limite de crédit ($)</label>
          <input type="number" inputmode="decimal" value="${c.limite||0}" onchange="updCarte('${c.id}','limite',this.value)">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;">
        <div class="input-wrap">
          <label>Taux annuel (%)</label>
          <input type="number" inputmode="decimal" value="${c.taux}" onchange="updCarte('${c.id}','taux',this.value)">
        </div>
        <div class="input-wrap">
          <label>Paiement min. / sem. ($)</label>
          <input type="number" inputmode="decimal" value="${c.min_h}" onchange="updCarte('${c.id}','min_h',this.value)">
        </div>
      </div>
      <div class="card-row" style="background:rgba(175,82,222,.08);">
        <span style="font-size:14px;color:var(--purple);font-weight:500;">Libre actuellement</span>
        <span style="font-size:16px;font-weight:700;color:var(--purple);">${fmt(libre)}</span>
      </div>
    </div>`
  })
 
  html+=`<button onclick="addCarte()" class="add-btn" style="margin-bottom:8px;">+ Ajouter une carte de crédit</button>
    </div>
 
    <div class="section-title">🎯 Objectifs hebdo</div>
    <div class="card">
      <div class="input-wrap">
        <label>Épargne cible / semaine ($)</label>
        <input type="number" inputmode="decimal" id="pr-ep" value="${params.epargne_h}">
      </div>
      <div class="input-wrap">
        <label>Dépenses variables cible / semaine ($)</label>
        <input type="number" inputmode="decimal" id="pr-dep" value="${params.dep_var_cible}">
      </div>
    <div class="input-wrap">
      <label>CELIAPP — cible / semaine ($)</label>
      <input type="number" inputmode="decimal" id="pr-celi-h" value="${params.celiapp_cible_h}">
      <div class="input-hint">8 000 $ / an ÷ 52 semaines = 153.85 $/sem recommandé</div>
    </div>
    <div class="input-wrap">
      <label>CELIAPP — montant déjà cotisé cette année ($)</label>
      <input type="number" inputmode="decimal" id="pr-celi-tot" value="${params.celiapp_total}">
      <div class="input-hint">Montant cotisé avant de commencer à utiliser cette app</div>
    </div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="saveParams()">Sauvegarder les réglages ✓</button>
  <div style="height:8px;"></div>`
 
  document.getElementById('params-body').innerHTML=html
}
 
function updRev(id,field,val){
  params.revenus_fixes=params.revenus_fixes.map(r=>r.id===id?{...r,[field]:field==='montant'?+val||0:val}:r)
}
function delRev(id){ params.revenus_fixes=params.revenus_fixes.filter(r=>r.id!==id); renderParams() }
function addRev(){
  params.revenus_fixes=[...params.revenus_fixes,{id:'r'+Date.now(),label:'Nouveau revenu',montant:0,periode:'hebdo'}]
  renderParams()
}
function updFact(id,field,val){
  params.factures=params.factures.map(f=>f.id===id?{...f,[field]:field==='montant'?+val||0:val}:f)
}
function delFact(id){ params.factures=params.factures.filter(f=>f.id!==id); renderParams() }
function addFact(){
  params.factures=[...params.factures,{id:'f'+Date.now(),label:'Nouvelle facture',montant:0}]
  renderParams()
}
function updCarte(id,field,val){
  params.cartes=params.cartes.map(c=>c.id===id?{...c,[field]:field==='nom'?val:+val||0}:c)
}
function delCarte(id){ params.cartes=params.cartes.filter(c=>c.id!==id); renderParams() }
function addCarte(){
  params.cartes=[...params.cartes,{id:'c'+Date.now(),nom:'Nouvelle carte',solde_init:0,limite:1000,taux:19.99,min_h:0}]
  renderParams()
}
function saveParams(){
  params.epargne_h=+(document.getElementById('pr-ep')?.value||0)
  params.dep_var_cible=+(document.getElementById('pr-dep')?.value||0)
  params.celiapp_cible_h=+(document.getElementById('pr-celi-h')?.value||0)
  params.celiapp_total=+(document.getElementById('pr-celi-tot')?.value||0)
  save(STORE_P,params)
  toast('Réglages sauvegardés ✓')
  renderAll()
}
 
function renderAll(){ renderHome(); renderSaisie(); renderHist(); renderParams() }
 
window.addEventListener('load',init)
</script>
</body>
</html>
